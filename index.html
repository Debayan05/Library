<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ria's Library Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Friendly, rounded font to keep the playful vibe */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap');
        
        body { 
            background: #FDF8F5; /* Warm parchment paper */
            min-height: 100vh; 
            font-family: 'Quicksand', sans-serif; 
            overflow-x: hidden;
            color: #3D405B; /* Deep, readable navy/charcoal */
        }

        /* Cozy Archive Banner */
        .manager-banner {
            background-image: linear-gradient(rgba(61, 64, 91, 0.3), rgba(61, 64, 91, 0.5)), url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da?auto=format&fit=crop&q=80&w=2000'); 
            background-size: cover;
            background-position: center 40%;
            height: 350px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 8%;
            border-bottom: 12px solid #D4A373; /* Chunky warm wood border */
            border-radius: 0 0 2.5rem 2.5rem; 
            box-shadow: 0 10px 25px rgba(212, 163, 115, 0.3);
        }

        .header-text h1 {
            font-weight: 900;
            font-size: 3.5rem;
            color: #FFFFFF;
            text-shadow: 
                -2px -2px 0 #E07A5F,  
                 2px -2px 0 #E07A5F,
                -2px  2px 0 #E07A5F,
                 2px  2px 0 #E07A5F,
                 4px  4px 0 #3D405B;
            line-height: 1.1;
            letter-spacing: 1.5px;
        }

        .header-text p {
            color: #E07A5F;
            background: #FDF8F5;
            padding: 6px 20px;
            border-radius: 8px; /* Slightly squarer for an "index card" look */
            display: inline-block;
            font-weight: 800;
            letter-spacing: 2px;
            margin-top: 15px;
            text-transform: uppercase;
            font-size: 0.85rem;
            border: 3px solid #D4A373;
            box-shadow: 2px 2px 0 #D4A373;
        }

        /* Playful Management Pill */
        .floating-counter {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #3D405B;
            color: #FDF8F5;
            padding: 10px 35px;
            border-radius: 12px;
            font-weight: 800;
            border: 4px solid #D4A373;
            box-shadow: 0 8px 15px rgba(61, 64, 91, 0.2);
            z-index: 20;
            font-size: 1rem;
        }

        /* "Index Card" Styling for Books */
        .cute-card { 
            background: #FFFFFF; 
            border: 4px solid #F4E1D2; 
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 20px rgba(212, 163, 115, 0.1);
        }

        .cute-card:hover { 
            transform: translateY(-8px); 
            border-color: #D4A373;
            box-shadow: 0 15px 30px rgba(224, 122, 95, 0.2); 
        }
        
        .book-cover { height: 260px; width: 100%; object-fit: cover; border-radius: 1.2rem 1.2rem 0 0; border-bottom: 4px solid #F4E1D2; }
        .status-badge { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.05em; border-radius: 8px; padding: 6px 12px; }
        
        /* Playful Inputs (Looking like forms/ledgers) */
        .cute-input {
            background: #FFFFFF;
            border: 3px solid #F4E1D2;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .cute-input:focus { border-color: #E07A5F; outline: none; box-shadow: 0 0 0 4px rgba(224, 122, 95, 0.15); }
        
        /* Admin Tabs styled like folder tabs */
        .admin-tab { color: #D4A373; background: #FDF8F5; border: 3px solid #F4E1D2; border-bottom: none; border-radius: 16px 16px 0 0; }
        .admin-tab.active { background: #E07A5F; color: white; border-color: #E07A5F; }
        
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #D4A373; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="manager-banner">
        <div class="header-text">
            <h1>Ria's Library</h1>
            <p><i class="fa-solid fa-boxes-stacked mr-2"></i> Archive Manager</p>
        </div>

        <div class="absolute top-8 right-8">
            <button onclick="openAdmin()" class="relative group">
                <img src="https://ui-avatars.com/api/?name=Ria&background=E07A5F&color=FFF" class="w-16 h-16 rounded-xl border-4 border-white shadow-lg group-hover:-translate-y-1 transition-transform">
                <div class="absolute -top-2 -right-2 bg-[#81B29A] w-6 h-6 rounded-full border-4 border-white flex items-center justify-center text-[10px] text-white font-bold"><i class="fa-solid fa-check"></i></div>
            </button>
        </div>

        <div id="bookCount" class="floating-counter uppercase tracking-widest">
            <i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading...
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-10 mt-16">
        
        <div class="bg-white rounded-3xl p-8 mb-12 shadow-sm grid grid-cols-1 md:grid-cols-4 gap-6 items-end border-4 border-[#F4E1D2]">
            <div>
                <label class="text-[11px] font-black text-[#E07A5F] uppercase tracking-widest mb-2 block"><i class="fa-solid fa-clipboard-list mr-1"></i> Catalog Search</label>
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-[#D4A373]"></i>
                    <input type="text" id="searchInput" oninput="applyFilters()" class="w-full pl-10 pr-4 py-3 cute-input font-bold text-[#3D405B]" placeholder="Title or author...">
                </div>
            </div>
            <div>
                <label class="text-[11px] font-black text-[#E07A5F] uppercase tracking-widest mb-2 block">Language</label>
                <select id="langFilter" onchange="applyFilters()" class="w-full p-3 cute-input font-bold text-[#3D405B]"></select>
            </div>
            <div>
                <label class="text-[11px] font-black text-[#E07A5F] uppercase tracking-widest mb-2 block">Genre Category</label>
                <select id="genreFilter" onchange="applyFilters()" class="w-full p-3 cute-input font-bold text-[#3D405B]"></select>
            </div>
            <div>
                <label class="text-[11px] font-black text-[#E07A5F] uppercase tracking-widest mb-2 block">Reading Status</label>
                <select id="statusFilter" onchange="applyFilters()" class="w-full p-3 cute-input font-bold text-[#3D405B]">
                    <option value="">Full Catalog</option>
                    <option value="Read">Completed</option>
                    <option value="Unread">Pending (To Read)</option>
                    <option value="In Progress">Currently Active</option>
                </select>
            </div>
        </div>

        <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 pb-20"></div>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-[#3D405B]/80 backdrop-blur-sm hidden flex items-center justify-center p-6 z-[100]">
        
        <div id="loginBox" class="bg-[#FDF8F5] rounded-[2rem] p-12 w-full max-w-md shadow-2xl text-center border-8 border-[#D4A373]">
            <div class="bg-[#E07A5F] w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 transform rotate-3">
                <i class="fa-solid fa-lock text-3xl text-white"></i>
            </div>
            <h2 class="text-3xl font-black mb-8 uppercase tracking-tighter text-[#3D405B]">System Access</h2>
            <input type="password" id="adminPass" placeholder="PIN CODE" class="w-full p-4 cute-input mb-6 text-center text-2xl tracking-widest font-bold text-[#3D405B]">
            <button onclick="verifyLogin()" class="w-full bg-[#E07A5F] hover:bg-[#D26447] text-white font-black py-4 rounded-xl shadow-[0_6px_0_#C2583B] hover:shadow-[0_2px_0_#C2583B] hover:translate-y-1 transition-all text-lg">ACCESS DATABASE</button>
            <button onclick="closeModal()" class="mt-8 text-[#81B29A] font-bold uppercase text-sm hover:text-[#3D405B]"><i class="fa-solid fa-arrow-left mr-1"></i> Return to Library</button>
        </div>

        <div id="adminDashboard" class="bg-[#FDF8F5] rounded-[2rem] p-8 w-full max-w-5xl shadow-2xl hidden max-h-[90vh] flex flex-col border-8 border-[#D4A373]">
            <div class="flex justify-between items-center mb-6 border-b-4 border-[#F4E1D2] pb-4">
                <h2 class="text-2xl font-black uppercase tracking-tighter text-[#3D405B]"><i class="fa-solid fa-box-archive mr-2 text-[#E07A5F]"></i> Master Catalog Manager</h2>
                <button onclick="closeModal()" class="text-[#D4A373] hover:text-[#E07A5F] text-3xl transition-colors"><i class="fa-solid fa-square-xmark"></i></button>
            </div>

            <div class="flex gap-2 mb-6 px-2">
                <button onclick="switchAdminTab('find')" id="tabFind" class="admin-tab active flex-1 py-3 font-black text-lg transition-all"><i class="fa-solid fa-magnifying-glass mr-2"></i> Inspect Records</button>
                <button onclick="switchAdminTab('add')" id="tabAdd" class="admin-tab flex-1 py-3 font-black text-lg transition-all"><i class="fa-solid fa-file-circle-plus mr-2"></i> Create Record</button>
            </div>

            <div id="contentFind" class="overflow-y-auto pr-3 custom-scroll flex-grow bg-white p-6 rounded-b-2xl rounded-tr-2xl border-4 border-[#F4E1D2] -mt-7">
                <div class="relative mb-6">
                    <i class="fa-solid fa-filter absolute left-4 top-1/2 -translate-y-1/2 text-[#D4A373]"></i>
                    <input type="text" id="adminSearchInput" oninput="applyAdminSearch()" class="w-full pl-12 pr-4 py-4 cute-input font-bold text-[#3D405B]" placeholder="Filter records by title or author...">
                </div>
                <div id="adminBookList" class="space-y-4"></div>
            </div>

            <div id="contentAdd" class="hidden overflow-y-auto pr-3 custom-scroll flex-grow bg-white p-6 rounded-b-2xl rounded-tl-2xl border-4 border-[#F4E1D2] -mt-7">
                <form id="bookForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="text-[10px] font-black text-[#81B29A] uppercase tracking-widest block mb-1">Title</label>
                        <input type="text" id="newTitle" placeholder="Enter book title" class="w-full p-4 cute-input font-bold text-[#3D405B]" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-[#81B29A] uppercase tracking-widest block mb-1">Author</label>
                        <input type="text" id="newAuthor" placeholder="Enter author name" class="w-full p-4 cute-input font-bold text-[#3D405B]" required>
                    </div>
                    
                    <select id="newLang" class="w-full p-4 cute-input font-bold text-[#3D405B]">
                        <option value="Bengali">Bengali</option><option value="English">English</option><option value="Hindi">Hindi</option>
                    </select>

                    <select id="newType" class="w-full p-4 cute-input font-bold text-[#3D405B]">
                        <option value="Novel / Collection">Novel / Collection</option><option value="Story / Collection">Story / Collection</option>
                        <option value="Poetry">Poetry</option><option value="Magazine">Magazine</option><option value="Textbook">Textbook</option>
                        <option value="Comic / Graphic Novel">Comic / Graphic Novel</option><option value="Drama">Drama</option><option value="Religious / Mythology">Religious / Mythology</option>
                    </select>

                    <select id="newGenre" class="w-full p-4 cute-input font-bold text-[#3D405B]">
                        <option value="Romance">Romance</option><option value="Fantasy">Fantasy</option><option value="Mystery / Thriller">Mystery / Thriller</option>
                        <option value="Horror / Paranormal">Horror / Paranormal</option><option value="Science Fiction">Science Fiction</option>
                        <option value="Historical Fiction">Historical Fiction</option><option value="Comedy">Comedy</option>
                        <option value="Classics">Classics</option><option value="Education">Education</option><option value="Others">Others</option>
                    </select>

                    <select id="newPublisher" class="w-full p-4 cute-input font-bold text-[#3D405B]">
                        <option value="Ananda">Ananda</option><option value="Patra Bharati">Patra Bharati</option><option value="Deys Publishing">Deys Publishing</option>
                        <option value="Rupa">Rupa</option><option value="Penguin">Penguin</option><option value="Others">Others</option>
                    </select>

                    <select id="newStatus" class="w-full p-4 cute-input font-bold text-[#3D405B]">
                        <option value="Read">Completed</option><option value="Unread">Pending</option><option value="In Progress">Active</option>
                    </select>
                    
                    <input type="number" id="newRating" placeholder="Rating (1-5)" min="1" max="5" class="w-full p-4 cute-input font-bold text-[#3D405B]">
                    <input type="text" id="newLoc" placeholder="Shelf / Location ID" class="w-full p-4 cute-input font-bold text-[#3D405B]">
                    <input type="text" id="newCover" placeholder="Cover Image URL (Drive/Web)" class="w-full p-4 cute-input font-bold text-[#3D405B]">
                    <textarea id="newComment" placeholder="Archivist Notes / Review..." class="w-full p-4 cute-input md:col-span-2 h-20 font-bold text-[#3D405B]"></textarea>
                    
                    <button type="submit" id="submitBtn" class="md:col-span-2 bg-[#E07A5F] hover:bg-[#D26447] text-white font-black py-4 rounded-xl shadow-[0_5px_0_#C2583B] hover:shadow-[0_2px_0_#C2583B] hover:translate-y-1 transition-all text-lg"><i class="fa-solid fa-cloud-arrow-up mr-2"></i> LOG RECORD TO DATABASE</button>
                    <button type="button" onclick="resetForm()" id="cancelEditBtn" class="hidden md:col-span-2 text-[#3D405B] font-bold uppercase text-xs hover:text-[#E07A5F]">Cancel Modification</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNb6adZTCJeJrx1uCahjkREth8JWjTYjX1hzZWV-tbTvC4LFY-IDwlM3ozFm3RJjEIF7pdSYXQgq7j/pub?gid=0&single=true&output=csv'; 
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxCqS-EGdINZnip7C0c3oKwWmAotXKQNA2sf_UGnyK1BkhSnbSYJwXuvNctT4Q3SeHlw/exec';
        const ADMIN_PASSWORD = '1234';

        let libraryData = [];
        let currentEditIndex = null;

        window.onload = fetchData;

        function fixImageUrl(url) {
            if (!url) return 'https://via.placeholder.com/300x450/FDF8F5/D4A373?text=No+Cover';
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0];
                return `https://docs.google.com/uc?id=${id}&export=download`;
            }
            return url;
        }

        function fetchData() {
            Papa.parse(SHEET_CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    libraryData = results.data.filter(row => row.Title && row.Title.trim() !== "");
                    populateFilters();
                    renderBooks(libraryData);
                    renderAdminList(libraryData);
                }
            });
        }

        function renderBooks(books) {
            const grid = document.getElementById('bookGrid');
            document.getElementById('bookCount').innerHTML = `<i class="fa-solid fa-layer-group mr-2"></i> ${books.length} Records Found`;
            grid.innerHTML = books.map(book => {
                const stars = '⭐'.repeat(Number(book.Rating) || 0);
                
                // Archival Theme Badges
                let badgeClass = 'bg-[#F2CC8F] text-[#916B27] border-2 border-[#E3B976]'; // Unread - Yellow Card
                let statusText = 'Pending';
                if (book.Status === 'Read') {
                    badgeClass = 'bg-[#81B29A] text-[#1E4D36] border-2 border-[#6B9E85]'; // Read - Sage Green Card
                    statusText = 'Completed';
                }
                if (book.Status === 'In Progress') {
                    badgeClass = 'bg-[#A8DADC] text-[#296568] border-2 border-[#8ACACD]'; // Reading - Soft Blue Card
                    statusText = 'Active';
                }

                return `
                    <div class="cute-card flex flex-col relative overflow-hidden group">
                        <img src="${fixImageUrl(book.CoverImage)}" class="book-cover group-hover:opacity-90 transition-opacity" alt="${book.Title}">
                        <div class="p-5 flex flex-col flex-grow bg-white">
                            <div class="flex justify-between items-start mb-3">
                                <span class="status-badge ${badgeClass}">${statusText}</span>
                                <span class="text-[10px] font-black text-[#E07A5F] uppercase border-2 border-[#F4E1D2] px-2 py-1 rounded-md bg-[#FDF8F5]">${book.Language}</span>
                            </div>
                            <h3 class="font-black text-xl text-[#3D405B] leading-tight mb-1">${book.Title}</h3>
                            <p class="text-xs font-bold text-[#D4A373] mb-4"><i class="fa-solid fa-feather-pointed mr-1"></i> ${book.Author}</p>
                            <div class="mt-auto">
                                <div class="flex items-center gap-2 text-xs font-bold text-[#3D405B] bg-[#FDF8F5] border-2 border-[#F4E1D2] px-3 py-2 rounded-lg mb-4 w-full">
                                    <i class="fa-solid fa-map-location-dot text-[#E07A5F]"></i> ${book.Location || 'General Circulation'}
                                </div>
                                <div class="flex justify-between border-t-2 border-dashed border-[#F4E1D2] pt-3 items-center">
                                    <span class="text-sm">${stars}</span>
                                    <span class="text-[9px] font-black text-[#81B29A] uppercase tracking-widest"><i class="fa-solid fa-tag mr-1"></i> ${book.Genre}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- ADMIN DASHBOARD LOGIC ---
        function verifyLogin() {
            if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
            } else { alert("Authentication Failed."); }
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('contentFind').classList.add('hidden');
            document.getElementById('contentAdd').classList.add('hidden');
            if (tab === 'find') {
                document.getElementById('tabFind').classList.add('active');
                document.getElementById('contentFind').classList.remove('hidden');
            } else {
                document.getElementById('tabAdd').classList.add('active');
                document.getElementById('contentAdd').classList.remove('hidden');
            }
        }

        function renderAdminList(books) {
            document.getElementById('adminBookList').innerHTML = books.map((book, index) => `
                <div class="flex items-center justify-between p-4 bg-[#FDF8F5] rounded-xl border-2 border-[#F4E1D2] hover:border-[#D4A373] transition-colors">
                    <div class="text-left">
                        <p class="font-black text-[#3D405B] text-md leading-tight">${book.Title}</p>
                        <p class="text-[11px] font-bold text-[#D4A373] uppercase tracking-widest mt-1"><i class="fa-solid fa-barcode mr-1"></i> ${book.Author}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startModify(${index})" class="bg-[#81B29A] text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-[#6B9E85] transition-colors"><i class="fa-solid fa-pen-to-square"></i> Modify</button>
                        <button onclick="handleDelete(${index})" class="bg-[#E07A5F] text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-[#D26447] transition-colors"><i class="fa-solid fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function applyAdminSearch() {
            const query = document.getElementById('adminSearchInput').value.toLowerCase();
            const filtered = libraryData.filter(b => b.Title.toLowerCase().includes(query) || b.Author.toLowerCase().includes(query));
            renderAdminList(filtered);
        }

        function startModify(index) {
            const book = libraryData[index];
            currentEditIndex = index;
            document.getElementById('newTitle').value = book.Title;
            document.getElementById('newAuthor').value = book.Author;
            document.getElementById('newLang').value = book.Language;
            document.getElementById('newType').value = book.Type;
            document.getElementById('newGenre').value = book.Genre;
            document.getElementById('newPublisher').value = book.Publisher;
            document.getElementById('newStatus').value = book.Status;
            document.getElementById('newRating').value = book.Rating;
            document.getElementById('newLoc').value = book.Location;
            document.getElementById('newComment').value = book.Comments;
            document.getElementById('newCover').value = book.CoverImage;
            document.getElementById('submitBtn').innerHTML = "<i class='fa-solid fa-file-pen mr-2'></i> UPDATE RECORD";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            switchAdminTab('add');
        }

        function resetForm() {
            currentEditIndex = null;
            document.getElementById('bookForm').reset();
            document.getElementById('submitBtn').innerHTML = "<i class='fa-solid fa-cloud-arrow-up mr-2'></i> LOG RECORD TO DATABASE";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        async function handleDelete(index) {
            if (confirm(`Expunge "${libraryData[index].Title}" from the archives?`)) await submitToGS({ action: "delete", rowIndex: index });
        }

        document.getElementById('bookForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                action: currentEditIndex !== null ? "edit" : "add",
                rowIndex: currentEditIndex,
                title: document.getElementById('newTitle').value,
                author: document.getElementById('newAuthor').value,
                language: document.getElementById('newLang').value,
                type: document.getElementById('newType').value,
                genre: document.getElementById('newGenre').value,
                publisher: document.getElementById('newPublisher').value,
                status: document.getElementById('newStatus').value,
                rating: document.getElementById('newRating').value,
                location: document.getElementById('newLoc').value,
                comments: document.getElementById('newComment').value,
                coverImage: document.getElementById('newCover').value
            };
            await submitToGS(payload);
        };

        async function submitToGS(payload) {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin mr-2'></i> Transmitting...";
            btn.disabled = true;
            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                location.reload();
            } catch (err) { alert("Transmission Error"); btn.disabled = false; }
        }

        function populateFilters() {
            const getUnique = (key) => ['All', ...new Set(libraryData.map(b => b[key]).filter(v => v))];
            const fill = (id, items) => { document.getElementById(id).innerHTML = items.map(i => `<option value="${i === 'All' ? '' : i}">${i}</option>`).join(''); };
            fill('langFilter', getUnique('Language'));
            fill('genreFilter', getUnique('Genre'));
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const l = document.getElementById('langFilter').value;
            const g = document.getElementById('genreFilter').value;
            const s = document.getElementById('statusFilter').value;
            const filtered = libraryData.filter(b => (b.Title.toLowerCase().includes(q) || b.Author.toLowerCase().includes(q)) && (!l || b.Language === l) && (!g || b.Genre === g) && (!s || b.Status === s));
            renderBooks(filtered);
        }

        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('adminModal').classList.add('hidden'); resetForm(); }
    </script>
</body>
