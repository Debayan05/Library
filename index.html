<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ria's Digital Library | Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); min-height: 100vh; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; }
        .glass-card:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.85); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .book-cover { height: 260px; width: 100%; object-fit: cover; }
        .status-badge { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.05em; }
        .admin-tab.active { background: #2563eb; color: white; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto flex justify-between items-center mb-10 bg-[#2563eb] p-5 rounded-[2rem] shadow-2xl text-white">
        <div class="flex items-center gap-4">
            <div class="bg-white/20 p-3 rounded-2xl"><i class="fa-solid fa-book-open-reader text-2xl"></i></div>
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase text-white">Ria's Library</h1>
                <p class="text-[10px] opacity-70 font-bold uppercase tracking-widest text-white">Personal Archive</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="bookCount" class="hidden md:block bg-black/20 px-4 py-2 rounded-full text-xs font-bold border border-white/20 text-white">Loading...</span>
            <button onclick="openAdmin()" class="group relative">
                <img src="https://ui-avatars.com/api/?name=Debayan+Ganguly&background=fff&color=2563eb" class="w-12 h-12 rounded-2xl border-2 border-white shadow-lg group-hover:rotate-6 transition-transform">
                <div class="absolute -top-1 -right-1 bg-green-400 w-4 h-4 rounded-full border-2 border-blue-600"></div>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="glass-card rounded-[2.5rem] p-8 mb-12 shadow-sm grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Quick Search</label>
                <input type="text" id="searchInput" oninput="applyFilters()" class="w-full px-4 py-3 rounded-2xl bg-white/50 border-none outline-none focus:ring-2 focus:ring-blue-500" placeholder="Title, author...">
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Language</label>
                <select id="langFilter" onchange="applyFilters()" class="w-full p-3 rounded-2xl bg-white/50 outline-none"></select>
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Genre</label>
                <select id="genreFilter" onchange="applyFilters()" class="w-full p-3 rounded-2xl bg-white/50 outline-none"></select>
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Status</label>
                <select id="statusFilter" onchange="applyFilters()" class="w-full p-3 rounded-2xl bg-white/50 outline-none">
                    <option value="">All Books</option>
                    <option value="Read">Read</option>
                    <option value="Unread">Unread</option>
                    <option value="In Progress">In Progress</option>
                </select>
            </div>
        </div>

        <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-6 z-[100]">
        
        <div id="loginBox" class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl text-center">
            <h2 class="text-2xl font-black mb-6 uppercase">Admin Access</h2>
            <input type="password" id="adminPass" placeholder="Password" class="w-full p-4 rounded-2xl border-2 border-gray-100 mb-4 outline-none text-center font-bold tracking-widest">
            <button onclick="verifyLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">LOGIN</button>
            <button onclick="closeModal()" class="mt-4 text-gray-400 text-xs font-bold uppercase">Cancel</button>
        </div>

        <div id="adminDashboard" class="bg-white rounded-[2.5rem] p-8 w-full max-w-4xl shadow-2xl hidden max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase">Library Management</h2>
                <button onclick="closeModal()" class="text-gray-300 hover:text-red-500 text-2xl"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>

            <div class="flex gap-2 mb-8 bg-gray-100 p-2 rounded-2xl">
                <button onclick="switchAdminTab('find')" id="tabFind" class="admin-tab active flex-1 py-3 rounded-xl font-bold">Find Book</button>
                <button onclick="switchAdminTab('add')" id="tabAdd" class="admin-tab flex-1 py-3 rounded-xl font-bold">Add New</button>
            </div>

            <div id="contentFind" class="overflow-y-auto pr-2 custom-scroll flex-grow">
                <input type="text" id="adminSearchInput" oninput="applyAdminSearch()" class="w-full px-4 py-4 mb-4 rounded-2xl bg-gray-50 outline-none border-2 border-transparent focus:border-blue-500" placeholder="Search title or author to modify/delete...">
                <div id="adminBookList" class="space-y-3"></div>
            </div>

            <div id="contentAdd" class="hidden overflow-y-auto pr-2 custom-scroll flex-grow">
                <form id="bookForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <input type="text" id="newTitle" placeholder="Book Title" class="w-full p-4 rounded-2xl bg-gray-50 outline-none border border-transparent focus:border-blue-500 font-bold" required>
                    <input type="text" id="newAuthor" placeholder="Author Name" class="w-full p-4 rounded-2xl bg-gray-50 outline-none border border-transparent focus:border-blue-500 font-bold" required>
                    
                    <select id="newLang" class="w-full p-4 rounded-2xl bg-gray-50 outline-none font-bold">
                        <option value="" disabled selected>Language</option>
                        <option value="Bengali">Bengali</option><option value="English">English</option><option value="Hindi">Hindi</option>
                    </select>

                    <select id="newType" class="w-full p-4 rounded-2xl bg-gray-50 outline-none font-bold">
                        <option value="" disabled selected>Type</option>
                        <option value="Novel / Collection">Novel / Collection</option>
                        <option value="Story / Collection">Story / Collection</option>
                        <option value="Poetry">Poetry</option>
                        <option value="Magazine">Magazine</option>
                        <option value="Textbook">Textbook</option>
                        <option value="Comic / Graphic Novel">Comic / Graphic Novel</option>
                        <option value="Drama">Drama</option>
                        <option value="Religious / Mythology">Religious / Mythology</option>
                    </select>

                    <select id="newGenre" class="w-full p-4 rounded-2xl bg-gray-50 outline-none font-bold">
                        <option value="" disabled selected>Genre</option>
                        <option value="Romance">Romance</option><option value="Fantasy">Fantasy</option><option value="Mystery / Thriller">Mystery / Thriller</option><option value="Horror / Paranormal">Horror / Paranormal</option><option value="Science Fiction">Science Fiction</option><option value="Historical Fiction">Historical Fiction</option><option value="Comedy">Comedy</option><option value="Classics">Classics</option><option value="Education">Education</option><option value="Others">Others</option>
                    </select>

                    <select id="newPublisher" class="w-full p-4 rounded-2xl bg-gray-50 outline-none font-bold">
                        <option value="" disabled selected>Publisher</option>
                        <option value="Ananda">Ananda</option><option value="Patra Bharati">Patra Bharati</option><option value="Deb Shatiyta Kutir">Deb Shatiyta Kutir</option><option value="Deys Publishing">Deys Publishing</option><option value="Mitra and Ghosh">Mitra and Ghosh</option><option value="Biva">Biva</option><option value="Book Farm">Book Farm</option><option value="Book Look">Book Look</option><option value="Cafe Table">Cafe Table</option><option value="Briti">Briti</option><option value="Deep Prakashan">Deep Prakashan</option><option value="Sahitya Academy">Sahitya Academy</option><option value="Abhijan Publishers">Abhijan Publishers</option><option value="Kalpabiswa">Kalpabiswa</option><option value="Antareep">Antareep</option><option value="Boibhashik">Boibhashik</option><option value="Shopizen Bangla">Shopizen Bangla</option><option value="Sayantan Publishers">Sayantan Publishers</option><option value="Smells of Book">Smells of Book</option><option value="Rupa">Rupa</option><option value="Penguin">Penguin</option><option value="Latika">Latika</option><option value="Narayan">Narayan</option><option value="Patit Paban">Patit Paban</option><option value="Aranyamon">Aranyamon</option><option value="Others">Others</option>
                    </select>

                    <select id="newStatus" class="w-full p-4 rounded-2xl bg-gray-50 outline-none font-bold">
                        <option value="Read">Read</option><option value="Unread">Unread</option><option value="In Progress">In Progress</option>
                    </select>
                    <input type="number" id="newRating" placeholder="Rating (1-5)" min="1" max="5" class="w-full p-4 rounded-2xl bg-gray-50 outline-none">
                    <input type="text" id="newLoc" placeholder="Location" class="w-full p-4 rounded-2xl bg-gray-50 outline-none">
                    <input type="text" id="newCover" placeholder="Cover Image Link" class="w-full p-4 rounded-2xl bg-gray-50 outline-none">
                    <textarea id="newComment" placeholder="Comments..." class="w-full p-4 rounded-2xl bg-gray-50 outline-none md:col-span-2 h-20"></textarea>
                    
                    <button type="submit" id="submitBtn" class="md:col-span-2 bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl">SAVE TO DATABASE</button>
                    <button type="button" onclick="resetForm()" id="cancelEditBtn" class="hidden md:col-span-2 text-red-500 font-bold uppercase text-xs">Exit Edit Mode</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // UPDATE THESE TWO LINKS
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNb6adZTCJeJrx1uCahjkREth8JWjTYjX1hzZWV-tbTvC4LFY-IDwlM3ozFm3RJjEIF7pdSYXQgq7j/pub?gid=0&single=true&output=csv'; 
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkw_IlBKfL1jIKkRguZ0mPw9Kn_FNX_onCWiPsUCpBCKOUilUIu_ZCnlFlFZGxDL5cqQ/exec';
        const ADMIN_PASSWORD = '1234';

        let libraryData = [];
        let currentEditIndex = null;

        window.onload = fetchData;

        function fixImageUrl(url) {
            if (!url) return 'https://via.placeholder.com/300x450?text=No+Cover';
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0];
                return `https://docs.google.com/uc?id=${id}&export=download`;
            }
            return url;
        }

        function fetchData() {
            Papa.parse(SHEET_CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    libraryData = results.data.filter(row => row.Title && row.Title.trim() !== "");
                    populateFilters();
                    renderBooks(libraryData);
                    renderAdminList(libraryData);
                }
            });
        }

        function renderBooks(books) {
            const grid = document.getElementById('bookGrid');
            document.getElementById('bookCount').innerText = `${books.length} Books`;
            grid.innerHTML = books.map(book => {
                const isRead = book.Status === 'Read';
                const isInProgress = book.Status === 'In Progress';
                const stars = '★'.repeat(Number(book.Rating) || 0) + '☆'.repeat(5 - (Number(book.Rating) || 0));
                
                let badgeClass = 'bg-orange-100 text-orange-600';
                if (isRead) badgeClass = 'bg-green-100 text-green-600';
                if (isInProgress) badgeClass = 'bg-blue-100 text-blue-600';

                return `
                    <div class="glass-card rounded-[2rem] flex flex-col relative overflow-hidden">
                        <img src="${fixImageUrl(book.CoverImage)}" class="book-cover" alt="${book.Title}">
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex justify-between items-start mb-3">
                                <span class="status-badge px-3 py-1 rounded-full uppercase ${badgeClass}">${book.Status}</span>
                                <span class="text-[10px] font-black text-gray-400 uppercase">${book.Language}</span>
                            </div>
                            <h3 class="font-black text-lg text-gray-800 leading-tight mb-1">${book.Title}</h3>
                            <p class="text-xs font-semibold text-gray-400 mb-4 italic">by ${book.Author}</p>
                            <div class="mt-auto">
                                <p class="text-[10px] text-red-500 font-bold mb-3"><i class="fa-solid fa-location-dot"></i> ${book.Location || 'Shelf'}</p>
                                <div class="flex justify-between border-t pt-3 items-center">
                                    <span class="text-yellow-400 text-xs">${stars}</span>
                                    <span class="text-[9px] font-bold text-gray-400 uppercase">${book.Genre}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- ADMIN ---
        function verifyLogin() {
            if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
            } else { alert("Wrong Password"); }
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('contentFind').classList.add('hidden');
            document.getElementById('contentAdd').classList.add('hidden');
            if (tab === 'find') {
                document.getElementById('tabFind').classList.add('active');
                document.getElementById('contentFind').classList.remove('hidden');
            } else {
                document.getElementById('tabAdd').classList.add('active');
                document.getElementById('contentAdd').classList.remove('hidden');
            }
        }

        function renderAdminList(books) {
            document.getElementById('adminBookList').innerHTML = books.map((book, index) => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl">
                    <div class="text-left">
                        <p class="font-black text-gray-800 text-sm leading-tight">${book.Title}</p>
                        <p class="text-[10px] font-bold text-gray-400 uppercase">${book.Author}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startModify(${index})" class="bg-blue-100 text-blue-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase">Modify</button>
                        <button onclick="handleDelete(${index})" class="bg-red-100 text-red-500 px-3 py-2 rounded-xl text-[10px] font-black uppercase">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function applyAdminSearch() {
            const query = document.getElementById('adminSearchInput').value.toLowerCase();
            const filtered = libraryData.filter(b => b.Title.toLowerCase().includes(query) || b.Author.toLowerCase().includes(query));
            renderAdminList(filtered);
        }

        function startModify(index) {
            const book = libraryData[index];
            currentEditIndex = index;
            document.getElementById('newTitle').value = book.Title;
            document.getElementById('newAuthor').value = book.Author;
            document.getElementById('newLang').value = book.Language;
            document.getElementById('newType').value = book.Type;
            document.getElementById('newGenre').value = book.Genre;
            document.getElementById('newPublisher').value = book.Publisher;
            document.getElementById('newStatus').value = book.Status;
            document.getElementById('newRating').value = book.Rating;
            document.getElementById('newLoc').value = book.Location;
            document.getElementById('newComment').value = book.Comments;
            document.getElementById('newCover').value = book.CoverImage;
            document.getElementById('submitBtn').innerText = "UPDATE BOOK";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            switchAdminTab('add');
        }

        function resetForm() {
            currentEditIndex = null;
            document.getElementById('bookForm').reset();
            document.getElementById('submitBtn').innerText = "SAVE TO DATABASE";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        async function handleDelete(index) {
            if (confirm("Delete this book?")) await submitToGS({ action: "delete", rowIndex: index });
        }

        document.getElementById('bookForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                action: currentEditIndex !== null ? "edit" : "add",
                rowIndex: currentEditIndex,
                title: document.getElementById('newTitle').value,
                author: document.getElementById('newAuthor').value,
                language: document.getElementById('newLang').value,
                type: document.getElementById('newType').value,
                genre: document.getElementById('newGenre').value,
                publisher: document.getElementById('newPublisher').value,
                status: document.getElementById('newStatus').value,
                rating: document.getElementById('newRating').value,
                location: document.getElementById('newLoc').value,
                comments: document.getElementById('newComment').value,
                coverImage: document.getElementById('newCover').value
            };
            await submitToGS(payload);
        };

        async function submitToGS(payload) {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Syncing...";
            btn.disabled = true;
            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                location.reload();
            } catch (err) { alert("Sync Error"); btn.disabled = false; }
        }

        function populateFilters() {
            const getUnique = (key) => ['All', ...new Set(libraryData.map(b => b[key]).filter(v => v))];
            const fill = (id, items) => { document.getElementById(id).innerHTML = items.map(i => `<option value="${i === 'All' ? '' : i}">${i}</option>`).join(''); };
            fill('langFilter', getUnique('Language'));
            fill('genreFilter', getUnique('Genre'));
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const l = document.getElementById('langFilter').value;
            const g = document.getElementById('genreFilter').value;
            const s = document.getElementById('statusFilter').value;
            const filtered = libraryData.filter(b => (b.Title.toLowerCase().includes(q) || b.Author.toLowerCase().includes(q)) && (!l || b.Language === l) && (!g || b.Genre === g) && (!s || b.Status === s));
            renderBooks(filtered);
        }

        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('adminModal').classList.add('hidden'); resetForm(); }
    </script>
</body>
</html>
